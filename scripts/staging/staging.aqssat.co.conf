# ─────────────────────────────────────────────────────────────────────
# Apache vhost for staging.aqssat.co
# ─────────────────────────────────────────────────────────────────────
# Drop into /etc/apache2/sites-available/ then:
#   sudo a2ensite staging.aqssat.co.conf
#   sudo systemctl reload apache2
#   sudo certbot --apache -d staging.aqssat.co --redirect
#
# This file is HTTP-only on purpose. Certbot's --apache plugin clones
# the :80 block into a :443 block (in a sibling -le-ssl.conf file) and
# wires up SSLCertificateFile / SSLCertificateKeyFile automatically;
# hard-coding those paths here breaks the bootstrap because Apache
# refuses to start when the cert files do not exist yet (chicken-and-
# egg: certbot needs Apache to answer the ACME challenge, Apache
# refuses to start without a cert).
#
# Why a separate vhost (and not just a path on namaa.aqssat.co)?
#   • Cookies are scoped per host, so a logged-in staging session can't
#     accidentally leak into a logged-in production session.
#   • CSP/CORS/CSRF tokens are tied to host — the isolation is real.

<VirtualHost *:80>
    ServerName staging.aqssat.co
    DocumentRoot /var/www/staging.aqssat.co/backend/web

    # Tells PHP / Yii which environment to apply. Read by
    # backend/web/index.php (which itself was overridden by the
    # environments/prod_staging/backend/web/index.php during init).
    SetEnv YII_ENV staging
    SetEnv FAHRAS_TOKEN_TAYSEER ""
    SetEnv FAHRAS_COMPANY_NAME ""

    # Robots: keep search engines OUT of staging — we have real-shape
    # data here even after scrubbing.
    Header always set X-Robots-Tag "noindex, nofollow, noarchive"

    <Directory /var/www/staging.aqssat.co/backend/web>
        AllowOverride All
        Require all granted

        # Enable Yii's pretty URLs
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . index.php [L]
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/staging.aqssat.co-error.log
    CustomLog ${APACHE_LOG_DIR}/staging.aqssat.co-access.log combined

    # Bigger upload limits so QA can stress-test scan workflows
    php_admin_value upload_max_filesize 50M
    php_admin_value post_max_size       60M
</VirtualHost>
