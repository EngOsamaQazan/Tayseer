name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 3m
          script: |
            set -e
            
            REPO_URL="https://${{ secrets.GH_TOKEN }}@github.com/EngOsamaQazan/Tayseer.git"
            BRANCH="main"
            
            deploy_site() {
              local SITE_DIR="$1"
              echo "=== Deploying $SITE_DIR ==="
              
              cd "$SITE_DIR"
              
              # First time: clone. After that: pull.
              if [ ! -d ".git" ]; then
                echo "  First deploy — cloning..."
                cd /tmp
                git clone --depth 1 --branch "$BRANCH" "$REPO_URL" tayseer_temp
                rsync -a --exclude='.env' --exclude='runtime/' --exclude='web/images/' --exclude='web/uploads/' tayseer_temp/ "$SITE_DIR/"
                rm -rf /tmp/tayseer_temp
                cd "$SITE_DIR"
                git init
                git remote add origin "$REPO_URL"
                git fetch origin "$BRANCH" --depth 1
                git reset --hard "origin/$BRANCH"
              else
                echo "  Pulling latest changes..."
                git fetch origin "$BRANCH" --depth 1
                git reset --hard "origin/$BRANCH"
              fi
              
              # Fix permissions
              chown -R www-data:www-data backend/ common/ console/ 2>/dev/null || true
              
              # Clear caches
              rm -rf backend/runtime/cache/*
              
              # Ensure writable dirs
              chmod -R 775 backend/runtime/ 2>/dev/null || true
              chmod -R 775 backend/web/assets/ 2>/dev/null || true
              
              echo "  Done!"
            }
            
            deploy_site "/var/www/vite.jadal.aqssat.co"
            deploy_site "/var/www/vite.namaa.aqssat.co"
            
            echo ""
            echo "All sites deployed successfully!"
