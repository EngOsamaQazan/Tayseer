name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            
            REPO_URL="https://${{ secrets.GH_TOKEN }}@github.com/EngOsamaQazan/Tayseer.git"
            BRANCH="main"
            
            deploy_site() {
              local SITE_DIR="$1"
              local ENV_DIR="$2"
              echo "=== Deploying $SITE_DIR (env: $ENV_DIR) ==="
              
              cd "$SITE_DIR"
              
              # First time: clone. After that: pull.
              if [ ! -d ".git" ]; then
                echo "  First deploy — cloning..."
                cd /tmp
                git clone --depth 1 --branch "$BRANCH" "$REPO_URL" tayseer_temp
                rsync -a --exclude='.env' --exclude='runtime/' --exclude='web/images/' --exclude='web/uploads/' tayseer_temp/ "$SITE_DIR/"
                rm -rf /tmp/tayseer_temp
                cd "$SITE_DIR"
                git init
                git remote add origin "$REPO_URL"
                git fetch origin "$BRANCH" --depth 1
                git reset --hard "origin/$BRANCH"
              else
                echo "  Pulling latest changes..."
                git fetch origin "$BRANCH" --depth 1
                git reset --hard "origin/$BRANCH"
              fi
              
            # Apply environment-specific local configs (DB credentials, debug mode)
            echo "  Applying $ENV_DIR environment configs..."
            for cfg in common/config/main-local.php common/config/params-local.php \
                       backend/web/index.php frontend/web/index.php \
                       console/config/main-local.php console/config/params-local.php \
                       yii; do
              if [ -f "environments/$ENV_DIR/$cfg" ]; then
                mkdir -p "$(dirname "$cfg")"
                cp -f "environments/$ENV_DIR/$cfg" "$cfg"
              fi
            done
            chmod +x yii 2>/dev/null || true
              
              # Cookie-key configs: only create if missing (preserve existing sessions)
              for cfg in backend/config/main-local.php backend/config/params-local.php \
                         frontend/config/main-local.php frontend/config/params-local.php; do
                if [ ! -f "$cfg" ] && [ -f "environments/$ENV_DIR/$cfg" ]; then
                  mkdir -p "$(dirname "$cfg")"
                  cp "environments/$ENV_DIR/$cfg" "$cfg"
                  KEY=$(openssl rand -hex 32)
                  sed -i "s/=> ''/=> '$KEY'/" "$cfg"
                fi
              done
              
              # Composer: skip if composer.lock unchanged
              NEW_HASH=$(md5sum composer.lock 2>/dev/null | cut -d' ' -f1)
              OLD_HASH=$(cat .composer-hash 2>/dev/null || echo "")
              if [ "$NEW_HASH" != "$OLD_HASH" ]; then
                echo "  Installing Composer dependencies..."
                composer install --no-dev --no-interaction --optimize-autoloader 2>&1 || echo "  Warning: composer install had issues"
                echo "$NEW_HASH" > .composer-hash
              else
                echo "  Composer unchanged — skipping install"
              fi
              
              # Fix permissions
              chown -R www-data:www-data backend/ common/ console/ frontend/ api/ vendor/ 2>/dev/null || true
              
            # Run pending migrations (skip if fails due to already-applied migrations)
            echo "  Running migrations..."
            php yii migrate/up --interactive=0 2>&1 || true
            
            # Execute idempotent SQL update files
            if [ -d "sql" ]; then
              DB_NAME=$(php -r "\$c = require 'common/config/main-local.php'; preg_match('/dbname=([^;]+)/', \$c['components']['db']['dsn'], \$m); echo \$m[1] ?? '';" 2>/dev/null)
              DB_USER=$(php -r "\$c = require 'common/config/main-local.php'; echo \$c['components']['db']['username'] ?? '';" 2>/dev/null)
              DB_PASS=$(php -r "\$c = require 'common/config/main-local.php'; echo \$c['components']['db']['password'] ?? '';" 2>/dev/null)
              if [ -n "$DB_NAME" ] && [ -n "$DB_USER" ]; then
                for sqlfile in sql/*.sql; do
                  [ -f "$sqlfile" ] || continue
                  echo "  Executing SQL: $sqlfile on $DB_NAME..."
                  mysql -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" < "$sqlfile" 2>&1 || echo "  Warning: SQL had errors (may be harmless)"
                done
              fi
            fi
              
              # Clear caches
              rm -rf backend/runtime/cache/*
              rm -rf frontend/runtime/cache/* 2>/dev/null || true
              
              # Ensure writable dirs
              chmod -R 775 backend/runtime/ 2>/dev/null || true
              chmod -R 775 backend/web/assets/ 2>/dev/null || true
              chmod -R 775 frontend/runtime/ 2>/dev/null || true
              chmod -R 775 frontend/web/assets/ 2>/dev/null || true
              
              # API directories (eFAWATEERcom)
              mkdir -p api/runtime api/web/assets 2>/dev/null || true
              chmod -R 775 api/runtime/ 2>/dev/null || true
              chmod -R 775 api/web/assets/ 2>/dev/null || true
              
              # Generate + normalize deadline records in background (idempotent, no timeout)
              nohup sh -c 'php yii deadline/generate && php yii deadline/normalize' > backend/runtime/logs/deadline-generate.log 2>&1 &
              
              echo "  Done!"
            }
            
            # Deploy all 3 sites in parallel
            deploy_site "/var/www/jadal.aqssat.co" "prod_jadal" &
            PID1=$!
            deploy_site "/var/www/namaa.aqssat.co" "prod_namaa" &
            PID2=$!
            deploy_site "/var/www/watar.aqssat.co" "prod_watar" &
            PID3=$!
            wait $PID1 $PID2 $PID3
            
            # Install webhook deploy script on server
            echo "=== Installing webhook deploy script ==="
            cp -f /var/www/jadal.aqssat.co/.github/deploy-pull.sh /opt/deploy-pull.sh
            chmod +x /opt/deploy-pull.sh
            
            # Create webhook secret if not exists
            if [ ! -f /opt/.webhook-secret ]; then
              openssl rand -hex 32 > /opt/.webhook-secret
              chmod 600 /opt/.webhook-secret
              echo "  Webhook secret generated: $(cat /opt/.webhook-secret)"
              echo "  >>> Add this secret to the GitHub webhook configuration <<<"
            fi
            
            # Deploy landing page to root domain aqssat.co
            echo "=== Deploying landing page to aqssat.co ==="
            LANDING_SRC="/var/www/jadal.aqssat.co/landing/index.html"
            LANDING_DST="/var/www/html/index.html"
            if [ -f "$LANDING_SRC" ]; then
              cp -f "$LANDING_SRC" "$LANDING_DST"
              chown www-data:www-data "$LANDING_DST" 2>/dev/null || true
              echo "  Landing page deployed to $LANDING_DST"
            else
              echo "  Warning: landing/index.html not found in repo"
            fi
            
            # Enable Apache performance modules (idempotent)
            echo "=== Enabling Apache modules ==="
            a2enmod deflate 2>/dev/null || true
            a2enmod expires 2>/dev/null || true
            a2enmod headers 2>/dev/null || true
            a2enmod http2 2>/dev/null || true
            a2enmod rewrite 2>/dev/null || true
            
            # Clear OPcache + PHP-FPM by restarting services
            echo "=== Clearing OPcache ==="
            PHP_VER=$(php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;" 2>/dev/null || echo "8.5")
            systemctl restart "php${PHP_VER}-fpm" 2>/dev/null || true
            systemctl reload apache2 2>/dev/null || systemctl restart apache2 2>/dev/null || true
            
            # Flush Yii2 caches
            for site_dir in /var/www/jadal.aqssat.co /var/www/namaa.aqssat.co /var/www/watar.aqssat.co; do
              cd "$site_dir" && php yii cache/flush-all 2>/dev/null || true
            done
            
            echo ""
            echo "All sites deployed successfully!"
